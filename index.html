<style>
        body {
            background-color: #000000; /* Overriding for pure black cinematic feel */
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
        }

        @keyframes bounce-sphere {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(0.95); }
        }
        
        .bouncing-sphere {
            animation: bounce-sphere 1.2s infinite cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        
        .bouncing-sphere:nth-child(2) {
            animation-delay: 0.15s;
        }

        .letter-collapse {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-on-background relative overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background w-full top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-6">
<div class="font-headline-md text-headline-md tracking-widest text-primary-container dark:text-primary-container">
                FOLKETS BIO AI
            </div>
<div class="flex items-center gap-gutter">
<button class="text-primary-container dark:text-primary-container hover:text-primary-container transition-all duration-300 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">grid_view</span>
</button>
<button class="text-primary-container dark:text-primary-container hover:text-primary-container transition-all duration-300 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center relative px-margin-mobile md:px-margin-desktop">
<!-- Center Stage -->
<div class="flex flex-col items-center justify-center space-y-16 text-center max-w-4xl w-full z-10 relative min-h-[400px]">
<!-- Agentic Status Indicator -->
<div class="flex items-center space-x-3 mb-8 transition-all duration-500" id="status-container">
<div class="w-2 h-2 bg-primary-container rounded-full animate-pulse shadow-[0_0_10px_rgba(229,9,20,0.8)]" id="status-indicator"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em] transition-all duration-500" id="status-text">System Online</span>
</div>
<!-- Main Headline -->
<h1 class="font-headline-xl text-headline-xl md:text-[96px] text-primary-container drop-shadow-[0_0_15px_rgba(229,9,20,0.3)] letter-collapse absolute top-[120px] left-1/2 -translate-x-1/2 w-full" id="main-headline">
                FOLKETS BIO AI ASSISTANT
            </h1>
<!-- Spheres Animation (Hidden Initially) -->
<div class="hidden justify-center items-center gap-8 h-32 absolute top-[150px] left-1/2 -translate-x-1/2 opacity-0 transition-opacity duration-700" id="spheres-container">
<div class="w-16 h-16 rounded-full bg-primary-container shadow-[0_0_40px_rgba(229,9,20,0.8)] bouncing-sphere relative after:absolute after:inset-0 after:rounded-full after:bg-white/20 after:blur-sm"></div>
<div class="w-16 h-16 rounded-full bg-primary-container shadow-[0_0_40px_rgba(229,9,20,0.8)] bouncing-sphere relative after:absolute after:inset-0 after:rounded-full after:bg-white/20 after:blur-sm"></div>
</div>
<!-- Prompt Input / Primary Action Area -->
<div class="w-full max-w-2xl mt-[200px] relative group transition-all duration-500" id="action-container">
<button class="w-full bg-primary-container text-on-primary-container py-4 px-8 border border-primary-container rounded-none font-label-sm text-label-sm uppercase tracking-widest hover:bg-primary hover:text-on-primary hover:border-primary transition-all duration-300 shadow-[0_0_20px_rgba(229,9,20,0.15)] group-hover:shadow-[0_0_30px_rgba(229,9,20,0.3)] flex items-center justify-center space-x-3" id="action-button">
<span class="material-symbols-outlined text-[18px]">bolt</span>
<span>Brainstorm programming ideas</span>
</button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-background dark:bg-background border-t border-white/10 w-full bottom-0 z-50 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-12 gap-gutter">
<div class="font-label-sm text-label-sm text-on-secondary-fixed-variant dark:text-on-secondary-fixed-variant">
                © 2024 FOLKETS BIO. POWERED BY AGENTIC INTELLIGENCE.
            </div>
<nav class="flex flex-wrap justify-center md:justify-end gap-gutter">
<a class="font-label-sm text-label-sm text-on-secondary-fixed-variant dark:text-on-secondary-fixed-variant hover:text-on-surface transition-colors duration-200 opacity-70 hover:opacity-100 transition-opacity" href="#">
                    SYSTEM STATUS
                </a>
<a class="font-label-sm text-label-sm text-on-secondary-fixed-variant dark:text-on-secondary-fixed-variant hover:text-on-surface transition-colors duration-200 opacity-70 hover:opacity-100 transition-opacity" href="#">
                    PROTOCOL
                </a>
<a class="font-label-sm text-label-sm text-on-secondary-fixed-variant dark:text-on-secondary-fixed-variant hover:text-on-surface transition-colors duration-200 opacity-70 hover:opacity-100 transition-opacity" href="#">
                    ARCHIVE
                </a>
</nav>
</div>
</footer>
<script>
    document.getElementById('action-button').addEventListener('click', function() {
        const actionContainer = document.getElementById('action-container');
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const mainHeadline = document.getElementById('main-headline');
        const spheresContainer = document.getElementById('spheres-container');

        // Fade out button
        actionContainer.classList.add('opacity-0', 'pointer-events-none');
        
        // Update Status
        statusText.style.opacity = '0';
        setTimeout(() => {
            statusText.textContent = 'SYNTHESIZING NEURAL PATHWAYS...';
            statusText.style.opacity = '1';
            statusIndicator.classList.remove('animate-pulse');
            statusIndicator.classList.add('animate-ping');
        }, 300);

        // Collapse Headline
        mainHeadline.classList.add('scale-y-0', 'opacity-0', 'blur-sm');
        
        // Show Spheres
        setTimeout(() => {
            mainHeadline.classList.add('hidden');
            spheresContainer.classList.remove('hidden');
            spheresContainer.classList.add('flex');
            // Trigger reflow for transition
            void spheresContainer.offsetWidth;
            spheresContainer.classList.remove('opacity-0');
            spheresContainer.classList.add('opacity-100');
        }, 600);
    });
</script>
</body></html>
