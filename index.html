<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FOLKETS BIO AI ASSISTANT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#000000",
                        "on-background": "#e2e2e2",
                        "primary-container": "#e50914",
                        "surface-container-low": "#111111",
                        "outline": "#af8782"
                    },
                    "fontFamily": {
                        "headline-md": ["Bebas Neue"],
                        "headline-xl": ["Bebas Neue"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        .bouncing-sphere {
            animation: bounce-sphere 1.2s infinite cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        @keyframes bounce-sphere {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(0.95); }
        }
        .chat-msg { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .letter-collapse { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>

<body class="min-h-screen flex flex-col text-on-background relative overflow-x-hidden">

<header class="bg-black/80 backdrop-blur-md w-full sticky top-0 z-50 border-b border-white/10">
    <div class="flex justify-between items-center w-full px-6 md:px-16 py-4">
        <div class="font-headline-md text-2xl tracking-widest text-primary-container">FOLKETS BIO AI</div>
        <div class="flex items-center gap-4">
            <span id="status-indicator" class="w-2 h-2 bg-red-600 rounded-full"></span>
            <span id="status-text" class="text-[10px] tracking-[0.4em] uppercase opacity-60">System Ready</span>
        </div>
    </div>
</header>

<main id="main-content" class="flex-grow flex flex-col items-center px-6 md:px-16 pt-20 pb-40 w-full">
    
    <!-- Hero Section -->
    <div id="hero-section" class="flex flex-col items-center justify-center min-h-[300px] relative w-full">
        <h1 class="font-headline-xl text-5xl md:text-[96px] text-primary-container drop-shadow-[0_0_15px_rgba(229,9,20,0.3)] letter-collapse text-center" id="main-headline">
            FOLKETS BIO AI ASSISTANT
        </h1>

        <!-- Spheres Animation -->
        <div class="hidden justify-center items-center gap-8 h-32 absolute opacity-0 transition-opacity duration-700" id="spheres-container">
            <div class="w-12 h-12 rounded-full bg-primary-container shadow-[0_0_40px_rgba(229,9,20,0.8)] bouncing-sphere relative after:absolute after:inset-0 after:rounded-full after:bg-white/20 after:blur-sm"></div>
            <div class="w-12 h-12 rounded-full bg-primary-container shadow-[0_0_40px_rgba(229,9,20,0.8)] bouncing-sphere relative after:absolute after:inset-0 after:rounded-full after:bg-white/20 after:blur-sm [animation-delay:0.15s]"></div>
        </div>
    </div>

    <!-- Action Area -->
    <div class="flex items-center justify-center w-full mt-12 transition-all duration-500" id="action-area">
        <div class="w-full max-w-2xl relative group" id="action-container">
            <button class="w-full bg-primary-container text-white py-5 px-8 border border-primary-container font-label-sm text-sm uppercase tracking-[0.3em] hover:bg-red-700 transition-all shadow-[0_0_20px_rgba(229,9,20,0.15)] flex items-center justify-center gap-3" id="action-button">
                <span class="material-symbols-outlined">bolt</span>
                BRAINSTORM PROGRAMMING IDEAS
            </button>
        </div>
    </div>

    <!-- The Content Flow (Results and chat will appear here) -->
    <div id="flow-container" class="w-full max-w-4xl space-y-12 mt-12">
        <!-- AI Data Injected Here -->
    </div>

</main>

<!-- Fixed Chat Bar (For Refinement) -->
<div id="chat-bar-container" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black to-transparent z-50 hidden opacity-0 transition-all duration-500">
    <div class="max-w-4xl mx-auto relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-primary-container/20 to-transparent blur opacity-25"></div>
        <div class="relative flex items-center bg-surface-container-low border border-white/10 p-2 pl-6 shadow-2xl">
            <input type="text" id="chat-input" 
                class="flex-grow bg-transparent border-none text-sm font-body-lg text-white focus:ring-0 outline-none placeholder:text-white/20"
                placeholder="REWRITE THE SECOND EVENT... / ADD MORE HALLOWEEN VIBES...">
            <button id="send-chat" class="p-3 text-primary-container hover:scale-110 transition-transform">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
</div>

<script>
    // 1. Generate a unique session ID for this browser session
    const sessionId = 'zita-' + Math.random().toString(36).substr(2, 9);
    let isInitialized = false;

    // Elements
    const actionButton = document.getElementById('action-button');
    const chatInput = document.getElementById('chat-input');
    const sendChatBtn = document.getElementById('send-chat');
    const flowContainer = document.getElementById('flow-container');
    const chatBar = document.getElementById('chat-bar-container');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');

    actionButton.addEventListener('click', () => callAgent());
    sendChatBtn.addEventListener('click', () => {
        const val = chatInput.value.trim();
        if (val) {
            appendUserMessage(val);
            callAgent(val);
            chatInput.value = '';
        }
    });

    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatBtn.click(); });

    async function callAgent(prompt = "Generate 3 initial programming ideas.") {
        if (!isInitialized) {
            const actionContainer = document.getElementById('action-container');
            const mainHeadline = document.getElementById('main-headline');
            const spheresContainer = document.getElementById('spheres-container');

            actionContainer.classList.add('opacity-0', 'pointer-events-none');
            mainHeadline.classList.add('scale-y-0', 'opacity-0', 'blur-sm');
            
            setTimeout(() => {
                document.getElementById('action-area').classList.add('hidden');
                mainHeadline.classList.add('hidden');
                spheresContainer.classList.remove('hidden');
                spheresContainer.classList.add('flex');
                void spheresContainer.offsetWidth; 
                spheresContainer.classList.remove('opacity-0');
                spheresContainer.classList.add('opacity-100');
            }, 600);

            statusText.textContent = "SYNTHESIZING...";
            statusIndicator.classList.add('animate-ping');
        } else {
            statusText.textContent = "REFINING PATHWAYS...";
            showLoadingLog();
        }

        try {
            const response = await fetch('https://cima87.app.n8n.cloud/webhook/trigger-zita-agents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: prompt, sessionId: sessionId })
            });

            if (!response.ok) throw new Error('HTTP Error');
            
            const data = await response.json();
            
            if (!isInitialized) {
                document.getElementById('hero-section').classList.add('hidden');
                chatBar.classList.remove('hidden');
                setTimeout(() => chatBar.classList.add('opacity-100'), 100);
                isInitialized = true;
            }

            renderIdeas(data);
            
            statusText.textContent = "SYSTEM ONLINE";
            statusIndicator.classList.remove('animate-ping');
            statusIndicator.classList.add('bg-green-500');

        } catch (error) {
            console.error("Connection or Parsing Error:", error);
            statusText.textContent = "SYSTEM ERROR";
            statusIndicator.classList.remove('animate-ping');
            statusIndicator.classList.replace('bg-green-500', 'bg-red-600');
            
            const tempLoader = document.getElementById('temp-loader');
            if (tempLoader) tempLoader.remove();
        }
    }

    function renderIdeas(data) {
        // 1. Extract the personality message (The Voice)
        const voiceHTML = data.agent_message ? `
            <div class="chat-msg flex gap-4 mb-12 items-start">
                <div class="w-10 h-10 rounded-full bg-primary-container flex-shrink-0 flex items-center justify-center font-headline-md text-xl text-white shadow-[0_0_20px_rgba(229,9,20,0.4)]">Z</div>
                <div class="bg-white/5 border border-white/10 p-6 rounded-2xl rounded-tl-none max-w-2xl">
                    <p class="text-body-lg text-white/90 leading-relaxed font-light italic">"${data.agent_message}"</p>
                </div>
            </div>
        ` : '';

        // 2. Map the actual cinematic ideas
        const cardsHTML = data.ideas.map(idea => {
            const films = (idea.film_recommendations && idea.film_recommendations.length > 0) 
                ? idea.film_recommendations.map(film => `
                    <li class="text-sm">
                        <span class="text-primary-container font-bold mr-2">/</span>
                        <strong class="uppercase text-white tracking-wider">${film.title}</strong>
                        <p class="text-outline text-xs mt-1 leading-normal font-light">${film.why_it_fits}</p>
                    </li>
                `).join('') 
                : '<li class="text-xs opacity-50 italic">Awaiting Film Expert analysis...</li>';

            return `
            <div class="chat-msg border-l-2 border-primary-container pl-8 py-8 bg-white/[0.02] mb-12 transition-all hover:bg-white/[0.04]">
                <h2 class="font-headline-md text-5xl text-primary-container tracking-wide uppercase mb-1">${idea.event_title || 'UNTITLED'}</h2>
                <p class="text-[10px] tracking-[0.4em] uppercase text-outline mb-6 italic font-bold">"${idea.marketing_hook || ''}"</p>
                <p class="text-body-lg text-white/70 leading-relaxed max-w-2xl mb-8 font-light">${idea.concept_summary || ''}</p>
                
                <div class="grid md:grid-cols-2 gap-10 border-t border-white/5 pt-8">
                    <div>
                        <h3 class="font-headline-md text-xl mb-4 tracking-widest opacity-90 text-primary-container">CINEMATIC AUDIT: APPROVED</h3>
                        <ul class="space-y-4">
                            ${films}
                        </ul>
                    </div>
                    <div class="bg-black/40 p-6 border border-white/5 rounded-sm">
                        <h3 class="text-[10px] tracking-[0.3em] uppercase opacity-40 mb-3">Strategic Reasoning</h3>
                        <p class="text-xs leading-relaxed opacity-60 italic font-light">${idea.reasoning || 'Strategic data not provided.'}</p>
                    </div>
                </div>
            </div>
            `;
        }).join('');

        // 3. Remove the loading state and append the new content
        const tempLoader = document.getElementById('temp-loader');
        if (tempLoader) tempLoader.remove();

        const container = document.createElement('div');
        container.innerHTML = `
            <div class="flex items-center gap-4 opacity-20 mb-12 mt-16">
                <div class="h-[1px] flex-grow bg-white"></div>
                <span class="text-[8px] tracking-[0.6em] uppercase">Transmission Updated</span>
                <div class="h-[1px] flex-grow bg-white"></div>
            </div>
            ${voiceHTML}
            ${cardsHTML}
        `;
        
        flowContainer.appendChild(container);
        
        // Smooth scroll to the new "Voice" bubble
        window.scrollTo({ 
            top: container.offsetTop - 100, 
            behavior: 'smooth' 
        });
    }

    function appendUserMessage(msg) {
        const div = document.createElement('div');
        div.className = "chat-msg flex justify-end mb-8 mt-12";
        div.innerHTML = `
            <div class="bg-primary-container/10 border border-primary-container/20 px-6 py-3 max-w-md">
                <p class="text-[10px] tracking-widest uppercase text-primary-container mb-1">User Instruction</p>
                <p class="text-sm font-body-lg text-white/90">${msg}</p>
            </div>
        `;
        flowContainer.appendChild(div);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function showLoadingLog() {
        const div = document.createElement('div');
        div.id = "temp-loader";
        div.className = "chat-msg flex gap-4 items-center opacity-50 mb-8";
        div.innerHTML = `
            <span class="w-1.5 h-1.5 bg-primary-container rounded-full animate-ping"></span>
            <span class="text-[10px] tracking-[0.3em] uppercase">Agent is reworking the concept...</span>
        `;
        flowContainer.appendChild(div);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
