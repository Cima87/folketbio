<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FOLKETS BIO AI ASSISTANT | REFINEMENT MODE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#131313",
                        "on-background": "#e2e2e2",
                        "primary-container": "#e50914",
                        "on-primary-container": "#fff7f6",
                        "surface-container-low": "#1b1b1b",
                        "outline": "#af8782"
                    },
                    "fontFamily": {
                        "headline-md": ["Bebas Neue"],
                        "headline-xl": ["Bebas Neue"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"]
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "margin-mobile": "16px",
                        "gutter": "24px"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
            scroll-behavior: smooth;
        }
        @keyframes bounce-sphere {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(0.95); }
        }
        .bouncing-sphere {
            animation: bounce-sphere 1.2s infinite cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        .bouncing-sphere:nth-child(2) { animation-delay: 0.15s; }
        .letter-collapse { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Custom Scrollbar for Chat */
        #chat-history::-webkit-scrollbar { width: 4px; }
        #chat-history::-webkit-scrollbar-track { background: transparent; }
        #chat-history::-webkit-scrollbar-thumb { background: rgba(229, 9, 20, 0.3); border-radius: 10px; }
    </style>
</head>

<body class="min-h-screen flex flex-col text-on-background relative overflow-x-hidden">

<header class="bg-background w-full top-0 z-50 sticky border-b border-white/5">
    <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-6">
        <div class="font-headline-md text-headline-md tracking-widest text-primary-container">
            FOLKETS BIO AI
        </div>
        <div class="flex items-center gap-gutter">
            <div class="flex items-center gap-3 mr-4">
                <span id="status-indicator" class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                <span id="status-text" class="text-[10px] tracking-[0.4em] uppercase opacity-70 transition-opacity duration-300">System Online</span>
            </div>
            <button class="text-primary-container scale-95 active:scale-90 transition-transform">
                <span class="material-symbols-outlined">grid_view</span>
            </button>
        </div>
    </div>
</header>

<main class="flex-grow flex flex-col relative px-margin-mobile md:px-margin-desktop py-20">
    
    <!-- Hero Section -->
    <div id="hero-section" class="flex flex-col items-center justify-center min-h-[300px] relative">
        <h1 class="font-headline-xl text-5xl md:text-[96px] text-primary-container drop-shadow-[0_0_15px_rgba(229,9,20,0.3)] letter-collapse text-center" id="main-headline">
            FOLKETS BIO AI ASSISTANT
        </h1>

        <!-- Spheres Animation -->
        <div class="hidden justify-center items-center gap-8 h-32 absolute opacity-0 transition-opacity duration-700" id="spheres-container">
            <div class="w-12 h-12 rounded-full bg-primary-container shadow-[0_0_40px_rgba(229,9,20,0.8)] bouncing-sphere relative after:absolute after:inset-0 after:rounded-full after:bg-white/20 after:blur-sm"></div>
            <div class="w-12 h-12 rounded-full bg-primary-container shadow-[0_0_40px_rgba(229,9,20,0.8)] bouncing-sphere relative after:absolute after:inset-0 after:rounded-full after:bg-white/20 after:blur-sm"></div>
        </div>
    </div>

    <!-- Action Area -->
    <div class="flex items-center justify-center w-full mt-12" id="action-area">
        <div class="w-full max-w-2xl relative group transition-all duration-500" id="action-container">
            <button class="w-full bg-primary-container text-on-primary-container py-5 px-8 border border-primary-container rounded-none font-label-sm text-label-sm uppercase tracking-[0.3em] hover:bg-red-700 transition-all duration-300 shadow-[0_0_20px_rgba(229,9,20,0.15)] flex items-center justify-center space-x-3" id="action-button">
                <span class="material-symbols-outlined text-[18px]">bolt</span>
                <span>Brainstorm programming ideas</span>
            </button>
        </div>
    </div>

    <!-- Results Display -->
    <div id="results-display" class="w-full max-w-4xl mx-auto mt-20 space-y-16 hidden opacity-0 transition-opacity duration-1000 pb-40">
        <!-- AI Data Injected Here -->
    </div>

</main>

<!-- Floating Chat Window (Human-in-the-Loop) -->
<div id="chat-wrapper" class="fixed bottom-6 right-6 w-[320px] md:w-[400px] z-[60] hidden translate-y-10 opacity-0 transition-all duration-700 pointer-events-auto">
    <div class="bg-surface-container-low/95 backdrop-blur-xl border border-primary-container/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-5 rounded-sm">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <h4 class="font-headline-md text-sm tracking-widest uppercase text-white">Refinement Loop</h4>
            </div>
            <span class="text-[9px] text-outline uppercase tracking-tighter opacity-50">Active Session</span>
        </div>
        
        <div id="chat-history" class="text-[11px] text-outline mb-4 h-28 overflow-y-auto italic leading-relaxed border-b border-white/5 pb-2 pr-2">
            "The initial concepts are ready. Would you like me to refine them? For example: 'Focus more on Halloween' or 'Swap the second film'."
        </div>

        <div class="relative">
            <input type="text" id="chat-input" 
                class="w-full bg-black border border-white/10 p-3 text-xs font-body-lg text-white focus:border-primary-container outline-none transition-colors pr-12 placeholder:opacity-30"
                placeholder="SEND REFINEMENT INSTRUCTIONS...">
            <button id="send-chat" class="absolute right-2 top-1/2 -translate-y-1/2 text-primary-container hover:scale-110 active:scale-90 transition-all">
                <span class="material-symbols-outlined text-md">send</span>
            </button>
        </div>
    </div>
</div>

<footer class="bg-background border-t border-white/10 w-full mt-auto">
    <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-12">
        <div class="font-label-sm text-[10px] tracking-widest text-outline uppercase opacity-50">
            © 2026 FOLKETS BIO. POWERED BY AGENTIC INTELLIGENCE.
        </div>
    </div>
</footer>

<script>
    // 1. Session Persistence Logic
    const sessionId = 'zita-' + Math.random().toString(36).substr(2, 9);
    let isFirstLoad = true;

    // UI Elements
    const actionButton = document.getElementById('action-button');
    const chatInput = document.getElementById('chat-input');
    const sendChatBtn = document.getElementById('send-chat');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');
    const resultsDisplay = document.getElementById('results-display');
    const chatHistory = document.getElementById('chat-history');

    // Handle Initial Trigger
    actionButton.addEventListener('click', () => callAgent());

    // Handle Chat Feedback
    sendChatBtn.addEventListener('click', () => {
        const val = chatInput.value.trim();
        if (val) {
            chatHistory.innerHTML += `<br><span class="text-primary-container">User:</span> ${val}`;
            chatHistory.scrollTop = chatHistory.scrollHeight;
            callAgent(val);
            chatInput.value = '';
        }
    });

    // Support Enter Key in Chat
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatBtn.click();
    });

    async function callAgent(userPrompt = "Generate 3 initial programming ideas.") {
        // UI Preparation
        if (isFirstLoad) {
            prepareInitialLoadingUI();
        } else {
            statusText.textContent = 'SYNTHESIZING FEEDBACK...';
            statusIndicator.classList.add('animate-ping');
        }

        try {
            const response = await fetch('https://cima87.app.n8n.cloud/webhook/trigger-zita-agents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    input: userPrompt,
                    sessionId: sessionId 
                })
            });

            if (!response.ok) throw new Error('Workflow Timeout');
            const data = await response.json();

            // Render results
            renderResults(data);
            
            // Post-Load UI Transitions
            if (isFirstLoad) {
                transitionToResults();
                isFirstLoad = false;
            }

            statusText.textContent = 'IDEAS CRYSTALLIZED';
            statusIndicator.classList.remove('animate-ping');
            statusIndicator.classList.add('bg-green-500');
            
            if (!isFirstLoad) {
                chatHistory.innerHTML += `<br><span class="text-green-500">Agent:</span> Ideas have been updated.`;
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }

        } catch (error) {
            console.error("Agent Error:", error);
            statusText.textContent = 'SYSTEM ERROR - CHECK CONNECTION';
            statusIndicator.classList.add('bg-orange-500');
        }
    }

    function prepareInitialLoadingUI() {
        const actionContainer = document.getElementById('action-container');
        const mainHeadline = document.getElementById('main-headline');
        const spheresContainer = document.getElementById('spheres-container');

        actionContainer.classList.add('opacity-0', 'pointer-events-none');
        statusText.style.opacity = '0';
        
        setTimeout(() => {
            statusText.textContent = 'SYNTHESIZING NEURAL PATHWAYS...';
            statusText.style.opacity = '1';
            statusIndicator.classList.remove('animate-pulse');
            statusIndicator.classList.add('animate-ping');
        }, 300);

        mainHeadline.classList.add('scale-y-0', 'opacity-0', 'blur-sm');
        
        setTimeout(() => {
            mainHeadline.classList.add('hidden');
            spheresContainer.classList.remove('hidden');
            spheresContainer.classList.add('flex');
            void spheresContainer.offsetWidth;
            spheresContainer.classList.remove('opacity-0');
            spheresContainer.classList.add('opacity-100');
        }, 600);
    }

    function transitionToResults() {
        const heroSection = document.getElementById('hero-section');
        const actionArea = document.getElementById('action-area');
        const chatWin = document.getElementById('chat-wrapper');

        heroSection.classList.add('hidden');
        actionArea.classList.add('hidden');
        resultsDisplay.classList.remove('hidden');
        
        setTimeout(() => {
            resultsDisplay.classList.replace('mt-20', 'mt-4');
            resultsDisplay.classList.remove('opacity-0');
            resultsDisplay.classList.add('opacity-100');
            
            // Show Chat Window
            chatWin.classList.remove('hidden');
            setTimeout(() => {
                chatWin.classList.remove('translate-y-10', 'opacity-0');
                chatWin.classList.add('translate-y-0', 'opacity-100');
            }, 500);
        }, 50);
    }

    function renderResults(data) {
        resultsDisplay.innerHTML = data.ideas.map(idea => `
            <div class="border-l-2 border-primary-container pl-8 py-4 bg-surface-container-low/30 rounded-r-xl transition-all hover:bg-surface-container-low/50">
                <h2 class="font-headline-md text-4xl text-primary-container mb-2 tracking-wide uppercase">${idea.event_title}</h2>
                <p class="text-xs tracking-[0.3em] uppercase text-outline mb-6 font-semibold italic">"${idea.marketing_hook}"</p>
                <p class="text-body-lg text-on-background/80 leading-relaxed mb-8 max-w-2xl">${idea.concept_summary}</p>
                
                <div class="grid md:grid-cols-2 gap-10 border-t border-white/5 pt-8">
                    <div>
                        <h3 class="font-headline-md text-xl mb-4 tracking-widest opacity-90">CINEMATIC AUDIT: APPROVED</h3>
                        <ul class="space-y-4">
                            ${idea.film_recommendations.map(film => `
                                <li class="text-sm">
                                    <span class="text-primary-container font-bold mr-2">/</span>
                                    <strong class="uppercase text-white">${film.title}</strong>
                                    <p class="text-outline text-xs mt-1 leading-normal">${film.why_it_fits}</p>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    <div class="bg-black/40 p-6 border border-white/5 rounded-sm">
                        <h3 class="text-[10px] tracking-[0.3em] uppercase opacity-40 mb-3">Strategic Reasoning</h3>
                        <p class="text-xs leading-relaxed opacity-70 italic font-light">${idea.reasoning}</p>
                    </div>
                </div>
            </div>
        `).join('');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
