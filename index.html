<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FOLKETS BIO AI | REFINEMENT BAR</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#000000",
                        "on-background": "#e2e2e2",
                        "primary-container": "#e50914",
                        "surface-container-low": "#111111",
                        "outline": "#af8782"
                    },
                    "fontFamily": {
                        "headline-md": ["Bebas Neue"],
                        "headline-xl": ["Bebas Neue"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        .bouncing-sphere {
            animation: bounce-sphere 1.2s infinite cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        @keyframes bounce-sphere {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        .chat-msg { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="min-h-screen flex flex-col text-on-background relative overflow-x-hidden">

<header class="bg-black/80 backdrop-blur-md w-full sticky top-0 z-50 border-b border-white/10">
    <div class="flex justify-between items-center w-full px-6 md:px-16 py-4">
        <div class="font-headline-md text-2xl tracking-widest text-primary-container">FOLKETS BIO AI</div>
        <div class="flex items-center gap-4">
            <span id="status-indicator" class="w-2 h-2 bg-red-600 rounded-full"></span>
            <span id="status-text" class="text-[10px] tracking-[0.4em] uppercase opacity-60">System Ready</span>
        </div>
    </div>
</header>

<main id="main-content" class="flex-grow flex flex-col items-center px-6 md:px-16 pt-20 pb-40">
    
    <!-- Hero (Hidden after first load) -->
    <div id="hero-section" class="flex flex-col items-center justify-center min-h-[40vh] transition-all duration-700">
        <h1 class="font-headline-xl text-6xl md:text-[100px] text-primary-container text-center leading-none">
            PROGRAMMING<br>ASSISTANT
        </h1>
        
        <div id="action-area" class="mt-12 w-full max-w-xl">
            <button id="action-button" class="w-full bg-primary-container text-white py-5 font-label-sm tracking-[0.3em] uppercase hover:bg-red-700 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">bolt</span>
                INITIALIZE BRAINSTORM
            </button>
        </div>

        <div id="spheres-container" class="hidden mt-20 gap-8">
            <div class="w-10 h-10 rounded-full bg-primary-container shadow-[0_0_30px_rgba(229,9,20,0.5)] bouncing-sphere"></div>
            <div class="w-10 h-10 rounded-full bg-primary-container shadow-[0_0_30px_rgba(229,9,20,0.5)] bouncing-sphere [animation-delay:0.2s]"></div>
        </div>
    </div>

    <!-- The Content Flow -->
    <div id="flow-container" class="w-full max-w-4xl space-y-12">
        <!-- Results and Chat logs appear here -->
    </div>

</main>

<!-- Fixed Chat Bar -->
<div id="chat-bar-container" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black to-transparent z-50 hidden opacity-0 transition-all duration-500">
    <div class="max-w-4xl mx-auto relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-primary-container/20 to-transparent blur opacity-25"></div>
        <div class="relative flex items-center bg-surface-container-low border border-white/10 p-2 pl-6 shadow-2xl">
            <input type="text" id="chat-input" 
                class="flex-grow bg-transparent border-none text-sm font-body-lg text-white focus:ring-0 outline-none placeholder:text-white/20"
                placeholder="REWRITE THE SECOND EVENT... / ADD MORE HALLOWEEN VIBES...">
            <button id="send-chat" class="p-3 text-primary-container hover:scale-110 transition-transform">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
</div>

<script>
    const sessionId = 'zita-' + Math.random().toString(36).substr(2, 9);
    let isInitialized = false;

    // Elements
    const actionButton = document.getElementById('action-button');
    const chatInput = document.getElementById('chat-input');
    const sendChatBtn = document.getElementById('send-chat');
    const flowContainer = document.getElementById('flow-container');
    const chatBar = document.getElementById('chat-bar-container');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');

    actionButton.addEventListener('click', () => callAgent());
    sendChatBtn.addEventListener('click', () => {
        const val = chatInput.value.trim();
        if (val) {
            appendUserMessage(val);
            callAgent(val);
            chatInput.value = '';
        }
    });

    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatBtn.click(); });

    async function callAgent(prompt = "Generate 3 initial programming ideas.") {
        if (!isInitialized) {
            document.getElementById('action-area').classList.add('hidden');
            document.getElementById('spheres-container').classList.replace('hidden', 'flex');
            statusText.textContent = "SYNTHESIZING...";
            statusIndicator.classList.add('animate-ping');
        } else {
            statusText.textContent = "REFINING PATHWAYS...";
            showLoadingLog();
        }

        try {
            const response = await fetch('https://cima87.app.n8n.cloud/webhook/trigger-zita-agents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: prompt, sessionId: sessionId })
            });

            const data = await response.json();
            
            // Render
            if (!isInitialized) {
                document.getElementById('hero-section').classList.add('hidden');
                chatBar.classList.remove('hidden');
                setTimeout(() => chatBar.classList.add('opacity-100'), 100);
                isInitialized = true;
            }

            renderIdeas(data);
            statusText.textContent = "SYSTEM ONLINE";
            statusIndicator.classList.remove('animate-ping');
            statusIndicator.classList.add('bg-green-500');

        } catch (error) {
            console.error(error);
            statusText.textContent = "CONNECTION ERROR";
        }
    }

    function renderIdeas(ideas) {
        // Clear previous ideas if we want to refresh them, or append if you prefer history
        // For refinement, usually we replace the cards with the "newest" versions
        const cardsHTML = ideas.map(idea => `
            <div class="chat-msg border-l-2 border-primary-container pl-8 py-6 bg-white/[0.02] mb-8">
                <h2 class="font-headline-md text-4xl text-primary-container tracking-wide uppercase">${idea.event_title}</h2>
                <p class="text-[10px] tracking-[0.4em] uppercase text-outline mt-1 mb-4 italic">"${idea.marketing_hook}"</p>
                <p class="text-body-lg text-white/80 leading-relaxed max-w-2xl">${idea.concept_summary}</p>
            </div>
        `).join('');

        // We append a "Generation Marker" to show the flow
        const container = document.createElement('div');
        container.innerHTML = `
            <div class="flex items-center gap-4 opacity-30 mb-8 mt-12">
                <div class="h-[1px] flex-grow bg-white/20"></div>
                <span class="text-[9px] tracking-[0.5em] uppercase">Updated Program Generated</span>
                <div class="h-[1px] flex-grow bg-white/20"></div>
            </div>
            ${cardsHTML}
        `;
        flowContainer.appendChild(container);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function appendUserMessage(msg) {
        const div = document.createElement('div');
        div.className = "chat-msg flex justify-end mb-8";
        div.innerHTML = `
            <div class="bg-primary-container/10 border border-primary-container/20 px-6 py-3 max-w-md">
                <p class="text-[10px] tracking-widest uppercase text-primary-container mb-1">User Instruction</p>
                <p class="text-sm font-body-lg text-white/90">${msg}</p>
            </div>
        `;
        flowContainer.appendChild(div);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function showLoadingLog() {
        const div = document.createElement('div');
        div.id = "temp-loader";
        div.className = "chat-msg flex gap-4 items-center opacity-50 mb-8";
        div.innerHTML = `
            <span class="w-1.5 h-1.5 bg-primary-container rounded-full animate-ping"></span>
            <span class="text-[10px] tracking-[0.3em] uppercase">Agent is reworking the concept...</span>
        `;
        flowContainer.appendChild(div);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
